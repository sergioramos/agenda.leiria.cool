name: check-sources

# Monday 06:00 UTC → re-check venues, propose closures / new venues.
# Also runnable on demand from /admin ("Verificar locais agora").
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: check-sources
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r crawler/requirements.txt
      - name: Check sources + discover new venues
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python crawler/check_sources.py --out-dir docs/data --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Commit bookkeeping + proposals
        run: |
          git config user.name "pregoeiro-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add sources/sources.json docs/data/proposed-changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sources: maintenance check $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push
          fi
