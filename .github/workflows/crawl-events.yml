name: crawl-events

# Sunday 06:00 UTC → this-week list. Also runnable on demand from /admin
# ("Recolher eventos agora") or the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: crawl-events
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r crawler/requirements.txt
      - name: Crawl shard ${{ matrix.shard }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python crawler/crawl_events.py --shard ${{ matrix.shard }} --of 8 --out _partials/shard-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: partial-${{ matrix.shard }}
          path: _partials/shard-${{ matrix.shard }}.json
          retention-days: 2

  merge:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r crawler/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          pattern: partial-*
          merge-multiple: true
          path: _partials
      - name: Fetch structured connectors (wide horizon, no AI)
        run: python crawler/fetch_connectors.py --out _partials/connectors.json
      - name: Merge shards + connectors into the week
        run: python crawler/merge_week.py --partials-dir _partials --out-dir docs/data --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Commit the new week
        run: |
          git config user.name "pregoeiro-bot"
          git config user.email "noreply@users.noreply.github.com"
          git add docs/data/weeks docs/data/pool.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "events: weekly crawl $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push
          fi
