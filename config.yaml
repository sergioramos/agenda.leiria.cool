# Lisbon Events — central configuration
# Plain-English knobs. Most people only ever touch the cost cap and the model.

scope: greater_lisbon            # greater_lisbon | city_only

week:
  # Which 7-day window each Sunday crawl covers.
  starts_on: monday              # the displayed week runs Monday..Sunday
  include_ongoing: true          # also show exhibitions/runs already open and still on
  lookahead_days: 7              # widen later (e.g. 14, 28) for more advance planning

schedule:
  # Times are UTC in the GitHub Actions cron. Lisbon is UTC+1 (summer) / UTC+0 (winter).
  events_crawl: "0 6 * * 0"      # Sunday 06:00 UTC  -> this-week list
  maintenance_crawl: "0 6 * * 1" # Monday 06:00 UTC  -> closures / new openings -> proposed changes

ai:
  # The crawler reads the key from the env var named in `api_key_env` (a GitHub Actions
  # secret). It is never stored in the repo. Switch provider with one line below.
  enabled: true
  provider: deepseek                  # deepseek | anthropic
  api_key_env: DEEPSEEK_API_KEY        # env/secret holding the key (ANTHROPIC_API_KEY for anthropic)
  base_url: "https://api.deepseek.com" # OpenAI-compatible endpoint (deepseek); set "" for anthropic
  model_cheap: "deepseek-v4-pro"       # extractor — ~$0.435 / $0.87 per MTok (chosen; very cheap, better than Flash)
  # To use Claude instead, set:
  #   provider: anthropic
  #   api_key_env: ANTHROPIC_API_KEY
  #   base_url: ""
  #   model_cheap: "claude-haiku-4-5"
  enrich_pages: false                  # AI NEVER reads individual event pages. Structured connectors already carry
                                       # price/time/image/description; per-page AI was pure cost and caused the empty-week
                                       # incident. AI is confined to long-tail HTML listings + Telegram free-text.
  max_run_cost_usd: 2          # ceiling per crawl run; stops calling the AI once hit
  max_month_cost_usd: 4        # ceiling per calendar month (sums committed runs); crawler refuses to exceed it
  review_events: true          # final AI sanity/dedupe pass over the assembled week: judges the
                               # ambiguous residue the rules can't (cross-venue same event, mis-tagged
                               # topic). Applies EVERY change automatically and records each reversibly;
                               # the /admin Estado wall shows the overview with a one-click Reverter
                               # (which also stops that merge recurring). Reads the compact event list
                               # only (no page fetching) -> cheap. A reverted merge is remembered in
                               # docs/data/review-overrides.json.
  review_max_cost_usd: 0.5     # ceiling for the review pass (one small call; cents in practice)
  request_timeout_s: 40
  max_chars_per_page: 18000      # trim fetched HTML text before sending to the model

connectors:
  # Structured JSON-API sources pulled once per run over a WIDE horizon into the
  # persistent pool (docs/data/pool.json); the weekly publish just filters it.
  # No AI, no cost. See crawler/connectors.py for the registry.
  enabled: true
  horizon_days: 75               # how far ahead to pull into the pool
  agendalx_max_pages: 12         # per_page=100 each (CM Lisboa official spine)
  ccb_max_pages: 12              # per_page=50, date-filtered (Tribe)
  gulbenkian_max_pages: 14       # per_page=50 (trimmed via _fields), ordered by recent publish
  detail_cap: 80                 # max event detail pages per jsonld_detail connector (Xceed/Mato)
  ticketline_max_pages: 30       # Ticketline agenda pages (district 12 = Lisboa, 20/page)
  ticketline_detail_cap: 150     # near-term Ticketline detail fetches (for time + price)
  image_recover_days: 21         # only recover posters for events starting within N days (or ongoing)
  image_recover_cap: 150         # max event pages fetched per run to recover a missing poster (no AI)

crawl:
  breadth: max                   # max | broad | lean  (which sources to attempt)
  shards: 8                      # parallel GitHub Actions jobs the source list is split across
  per_source_timeout_s: 25
  user_agent: "LisbonEventsBot/1.0 (+https://github.com/) personal weekly events digest"
  polite_delay_ms: 800           # delay between requests to the same host
  retries: 2
  # Hosts we never scrape (anti-bot / ToS). Their @handles are kept in the directory for humans.
  skip_hosts: ["instagram.com", "facebook.com", "t.me", "telegram.me", "whatsapp.com", "tiktok.com"]
  # Prefer structured feeds when present (checked automatically per source).
  prefer_feeds: true
  # Hosts behind Cloudflare/JS that 403 the bot: fetch their event pages with a
  # real headless browser (Playwright) so the poster is recoverable. Used ONLY as
  # a fallback for these hosts, bounded per run. Needs Chromium in the crawl job;
  # degrades to "no image" if absent. Keep this list tight.
  browser_hosts: ["tickettailor.com"]
  browser_fetch_cap: 40          # max headless-browser fetches per crawl run
  browser_wait_ms: 4000          # wait after load for the Cloudflare/JS challenge to clear

maintenance:
  mode: propose                  # propose | auto | flag_only
  # How many consecutive "looks dead" signals before we propose removing a venue.
  closure_signals_to_flag: 2
  discover_new: true             # mine aggregators for venues not yet in the seed list

output:
  weeks_dir: "data/weeks"
  proposed_dir: "data/proposed-changes"
  keep_weeks: 104                # ~2 years of history before old snapshots are pruned
