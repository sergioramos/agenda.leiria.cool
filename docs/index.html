<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pregoeiro — esta semana em Lisboa</title>
  <meta name="description" content="O pregão semanal de Lisboa: tudo o que abre, toca e acontece esta semana, por tema." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0,0..1;1,9..144,300..700,0,0..1&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Space+Mono:wght@400;700&display=swap" />
  <link rel="stylesheet" href="./assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📣</text></svg>" />
</head>
<body>
  <div class="topbar">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
  <div class="topbar-rule" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap">
      <div class="masthead">
        <img class="brand-logo" src="./assets/logo.svg" alt="Pregoeiro" width="153" height="40" />
        <div class="week-control">
          <span class="week-control-label">Semana</span>
          <span class="week-control-value">
            <span id="week-value">—</span>
            <svg class="caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10l5 5 5-5z" /></svg>
            <select id="week-select" aria-label="Escolher semana"></select>
          </span>
        </div>
      </div>
      <hr class="rule-dashed" />
    </div>
  </header>

  <main class="wrap">
    <section class="hero" aria-label="Esta semana">
      <div class="hero-text">
        <p class="hero-eyebrow">eventos · festas · atividades</p>
        <h1 class="hero-title">Esta <em>semana</em> em Lisboa.</h1>
        <p class="hero-sub">Tudo o que acontece nos próximos sete dias. Organizado por tema, com filtros por dia &amp; preço.</p>
      </div>
      <div class="hero-controls">
        <div class="searchbar">
          <label class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#1d1813" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7" /><path d="M21 21l-6-6" /></svg>
            <span class="sr-only">Pesquisar</span>
            <input id="search" type="search" placeholder="Pesquisar eventos, locais, bairros…" autocomplete="off" />
          </label>
          <button id="filters-toggle" class="filters-btn" aria-expanded="false">
            <span class="filt-sign" id="filt-sign" aria-hidden="true">+</span> Filtros
          </button>
        </div>
        <!-- expanded filters open right below the search row (Figma 17:154) -->
        <div class="filter-panel" id="filter-panel" hidden>
          <div class="filter-group filter-day">
            <h3>Dia</h3>
            <div class="chips small" id="day-chips" role="group" aria-label="Dia"></div>
          </div>
          <div class="filter-group filter-price">
            <h3>Preço</h3>
            <div class="chips small" id="price-chips" role="group" aria-label="Preço">
              <button class="chip" type="button" data-price="all" aria-pressed="true"><span>Todos</span></button>
              <button class="chip" type="button" data-price="free" aria-pressed="false"><span>Só grátis</span></button>
            </div>
          </div>
        </div>
        <div class="chips" id="topic-chips" role="group" aria-label="Temas"></div>
      </div>
    </section>

    <hr class="rule-solid" />

    <section class="controls" aria-label="Filtros avançados">
      <div class="result-meta">
        <span id="result-count">—</span>
        <span id="active-filters" class="muted"></span>
      </div>
    </section>

    <section id="results" aria-live="polite"></section>

    <div id="empty" class="empty" hidden>
      <p>Nenhum evento corresponde aos filtros.</p>
      <button class="btn" id="empty-clear">Limpar filtros</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <hr class="rule-solid" />
      <div class="footer-row">
        <p class="footer-credit">Criado com ❤️ por <span>Nucabé</span></p>
        <p id="footer-stats"></p>
      </div>
    </div>
  </footer>

  <script src="./assets/ticker.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
